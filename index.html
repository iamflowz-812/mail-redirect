<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontakt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #111;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #1b1b1b;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #cfcfcf;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 18px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
    }
    .primary {
      background: #fff;
      color: #111;
      font-weight: bold;
    }
    .secondary {
      background: #2b2b2b;
      color: #fff;
    }
    .mail {
      margin-top: 16px;
      font-size: 15px;
      color: #aaa;
      word-break: break-all;
    }
    .note {
      margin-top: 16px;
      font-size: 14px;
      color: #8f8f8f;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Booking Request FLOWZ</h1>
    <p>The easiest way to send an enquiry is to open your email app or copy the address directly.</p>

    <a class="btn primary" href="mailto:marvin@subvoidagency.com?subject=Booking%20Request%20FLOWZ&body=SUBVOID%20Booking%20Request%0AArtist%3A%20FLOWZ%0AEvent%3A%0ADate%3A%0ALocation%0ACapacity%3A%0AImportant%20details%3A">
      Submit your request here
    </a>

    <button class="btn secondary" onclick="copyMail()">
      Copy email address
    </button>

    <div class="mail">marvin@subvoidagency.de</div>
    <div class="note" id="note">If no email app opens, copy the address and send the email manually.</div>
  </div>

  <script>
    function copyMail() {
      const mail = "marvin@subvoidagency.de";
      navigator.clipboard.writeText(mail).then(() => {
        document.getElementById("note").textContent = "The email address has been copied.";
      }).catch(() => {
        document.getElementById("note").textContent = "Copying didn't work. Please copy the address manually.";
      });
    }
  </script>
</body>
</html>
