<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Request FLOWZ</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #111;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #1b1b1b;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #cfcfcf;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 18px;
      margin: 12px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
    }
    .primary {
      background: #fff;
      color: #111;
      font-weight: bold;
    }
    .secondary {
      background: #2b2b2b;
      color: #fff;
    }
    .mail {
      margin-top: 16px;
      font-size: 15px;
      color: #aaa;
      word-break: break-all;
      display: none; /* 👈 versteckt */
    }
    .note {
      margin-top: 16px;
      font-size: 14px;
      color: #8f8f8f;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Booking Request FLOWZ</h1>

    <p>
      For booking inquiries, open your email app or copy the address below.
    </p>

    <a class="btn primary"
       href="mailto:marvin@subvoidagency.com?subject=Booking%20Request%20FLOWZ&body=SUBVOID%20Booking%20Request%0AArtist%3A%20FLOWZ%0AEvent%3A%0ADate%3A%0ALocation%3A%0ACapacity%3A%0AImportant%20details%3A">
      Open email app
    </a>

    <button class="btn secondary" onclick="copyMail()">
      Copy email address
    </button>

    <!-- Wird nur bei Fehler sichtbar -->
    <div class="mail" id="mail">
      marvin@subvoidagency.de
    </div>

    <div class="note" id="note">
      If nothing happens, try copying the email address.
    </div>
  </div>

  <script>
    function copyMail() {
      const mail = "marvin@subvoidagency.de";

      navigator.clipboard.writeText(mail).then(() => {
        document.getElementById("note").textContent = "Email address copied.";
      }).catch(() => {
        document.getElementById("note").textContent = "Copy failed. Please copy manually.";
        document.getElementById("mail").style.display = "block"; // 👈 jetzt anzeigen
      });
    }
  </script>
</body>
</html>
